<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieApp</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <h2 class="navbar__logo">MovieApp</h2>
        <ul class="navbar__list">
          <li class="navbar__item">
            <a href="#" class="navbar__link">Filmler</a>
          </li>
          <li class="navbar__item">
            <a href="#" class="navbar__link">Diziler</a>
          </li>
          <li class="navbar__item">
            <a href="index.html" class="navbar__link">Ana Sayfa</a>
          </li>
        </ul>
      </div>
    </nav>
    <main class="main">
      <section class="form">
        <h1 class="form__title">Create Your Account</h1>
        <form action="" class="form-items">
          <label for="firstname">First Name</label>
          <input type="text" id="firstname" placeholder="Murat Efe" />

          <label for="lastname">Last Name</label>
          <input type="text" id="lastname" placeholder="Ergin" />

          <label for="email">Email</label>
          <input
            type="email"
            name=""
            id="email"
            placeholder="muratefeergin.dev@gmail.com"
          />

          <label for="password">Password</label>
          <input type="password" name="" id="password" />

          <label for="gender">Gender</label>
          <select id="gender">
            <option value="" disabled selected>Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <div>
            <input type="checkbox" id="agree" />
            <label for="agree"
              >Agree to <a href="#">Term & Conditions</a></label
            >
          </div>
          <div class="form-button__group">
            <button type="submit" class="btn form-button">Sign Up</button>
            <button type="reset" class="btn">Reset</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer__list">
          <ul>
            <li><a href="#">About</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Forum</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </div>

        <div class="footer__logo">
          <ul>
            <li>
              <a href="#"
                ><i
                  class="fa-brands fa-facebook fa-xl"
                  style="color: rgb(0, 142, 255)"
                ></i
              ></a>
            </li>
            <li>
              <a href="#"
                ><i
                  class="fa-brands fa-instagram fa-xl"
                  style="color: rgb(255, 255, 255)"
                ></i
              ></a>
            </li>
            <li>
              <a href="#"
                ><i
                  class="fa-brands fa-square-x-twitter fa-xl"
                  style="color: rgb(0, 0, 0)"
                ></i
              ></a>
            </li>
          </ul>
          <p class="footer__copy">&copy; 2026 MovieApp</p>
        </div>
      </div>
    </footer>
  </body>
</html>
